name: weather-station
services:
  backend:
    image: nongpumpui/weather-backend:latest
    container_name: backend_service
    restart: unless-stopped
    depends_on:
      - postgres
    env_file:
      - .env
    ports:
      - "8000:8000"
    networks:
      - weather-station_network

  frontend:
    image: nongpumpui/weather-frontend:latest
    container_name: frontend_service
    restart: unless-stopped
    networks:
      - weather-station_network

  postgres:
    image: postgres:16
    container_name: weather_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - weather-station_network

  nginx:
    image: nginx:latest
    container_name: nginx_service
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - weather-station_network

volumes:
  postgres_data:
    external: true
    name: weather-station_postgres_data

networks:
  weather-station_network:
    driver: bridge
